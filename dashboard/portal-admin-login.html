<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — Cult Content</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #12101a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1c1828;
      border: 1px solid #2a2540;
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo { height: 38px; }
    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      color: #fff;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 0.82rem;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    input {
      display: block;
      width: 100%;
      background: #12101a;
      border: 1px solid #2a2540;
      border-radius: 9px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }
    input:focus { border-color: #00f2ea; }
    .btn {
      display: block;
      width: 100%;
      background: #00f2ea;
      color: #12101a;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 9px;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 0.82rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: none;
    }
    .admin-badge {
      display: inline-block;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      color: #c9a84c;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .logo-wrap .admin-badge { display: block; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img class="logo" src="https://assets.cdn.filesafe.space/c216j58Vx9XxYa7WYMiA/media/68529ceff63e1913ceb4e2e0.png" alt="Cult Content">
    </div>
    <h1>Admin Portal</h1>
    <p class="subtitle">Enter your admin password to continue.</p>

    <div class="error" id="errMsg"></div>

    <form id="loginForm">
      <label for="password">Admin Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errMsg = document.getElementById('errMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/portal-admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/portal-admin/clients';
        } else {
          errMsg.textContent = data.error || 'Incorrect password.';
          errMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errMsg.textContent = 'Network error — please try again.';
        errMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
