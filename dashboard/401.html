<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Required — Cult Content</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #e8e8f0;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .card {
      background: #13131a; border: 1px solid #1e1e2e; border-radius: 16px;
      padding: 48px 40px; max-width: 420px; width: 100%;
    }
    .logo { font-size: 13px; font-weight: 900; letter-spacing: 0.12em; color: #00f2ea; margin-bottom: 32px; }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 13px; color: #6b6b8a; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-block; background: #00f2ea; color: #000;
      font-weight: 800; font-size: 13px; padding: 10px 28px;
      border-radius: 8px; text-decoration: none; letter-spacing: 0.04em;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CULT CONTENT</div>
    <h1>Sign in required</h1>
    <p>The Command Center is only accessible to Cult Content team members.<br>Sign in with your <strong>@cultcontent.cc</strong> Google account to continue.</p>
    <a href="/">Sign in with Google →</a>
  </div>
</body>
</html>
