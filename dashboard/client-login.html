<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — Cult Content</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #12101a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1c1828;
      border: 1px solid #2a2540;
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      height: 38px;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      color: #fff;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 0.82rem;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    input {
      display: block;
      width: 100%;
      background: #12101a;
      border: 1px solid #2a2540;
      border-radius: 9px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }
    input:focus { border-color: #00f2ea; }
    .btn {
      display: block;
      width: 100%;
      background: #00f2ea;
      color: #12101a;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 9px;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.02em;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 8px;
      color: #ff3b30;
      font-size: 0.83rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
    .divider {
      border: none;
      border-top: 1px solid #2a2540;
      margin: 28px 0 20px;
    }
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img class="logo" src="https://assets.cdn.filesafe.space/c216j58Vx9XxYa7WYMiA/media/68529ceff63e1913ceb4e2e0.png" alt="Cult Content">
    </div>
    <h1 id="title">Client Portal</h1>
    <p class="subtitle" id="subtitle">Sign in to view your brand dashboard</p>

    <div class="error" id="err"></div>

    <!-- Sign in form -->
    <form id="form-login" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@brand.com" autocomplete="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

      <button class="btn" type="submit" id="btn-login">Sign In</button>
    </form>

    <!-- First-time password setup form (hidden by default) -->
    <form id="form-setup" autocomplete="on" style="display:none">
      <label for="setup-email">Email</label>
      <input type="email" id="setup-email" name="setup-email" placeholder="you@brand.com" autocomplete="email" required>

      <label for="new-password">Create a password</label>
      <input type="password" id="new-password" name="new-password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">

      <label for="confirm-password">Confirm password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" autocomplete="new-password" required minlength="8">

      <button class="btn" type="submit" id="btn-setup">Create Account & Sign In</button>
    </form>

    <hr class="divider">
    <p class="footer" id="footer-signin">
      New client?
      <a href="#" id="show-setup-link" style="color:#00f2ea;text-decoration:none;font-weight:600;" onclick="showSetupForm(event)">Create your account →</a>
    </p>
    <p class="footer" id="footer-setup" style="display:none">
      Already have an account?
      <a href="#" style="color:#00f2ea;text-decoration:none;font-weight:600;" onclick="showLoginForm(event)">Sign in →</a>
    </p>
  </div>

  <script>
    // Check URL params — onboarding form passes ?new=1&email=... to pre-fill setup
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('new') === '1') {
        const email = params.get('email') || '';
        showSetupForm(null, email);
      }
    })();

    function showSetupForm(e, prefillEmail) {
      if (e) e.preventDefault();
      document.getElementById('form-login').style.display = 'none';
      document.getElementById('form-setup').style.display = 'block';
      document.getElementById('footer-signin').style.display = 'none';
      document.getElementById('footer-setup').style.display = 'block';
      document.getElementById('title').textContent = 'Create your account';
      document.getElementById('subtitle').textContent = 'Set a password to access your brand dashboard';
      document.getElementById('err').style.display = 'none';
      if (prefillEmail) document.getElementById('setup-email').value = prefillEmail;
      document.getElementById(prefillEmail ? 'new-password' : 'setup-email').focus();
      history.replaceState({}, '', window.location.pathname);
    }

    function showLoginForm(e) {
      if (e) e.preventDefault();
      document.getElementById('form-setup').style.display = 'none';
      document.getElementById('form-login').style.display = 'block';
      document.getElementById('footer-setup').style.display = 'none';
      document.getElementById('footer-signin').style.display = 'block';
      document.getElementById('title').textContent = 'Client Portal';
      document.getElementById('subtitle').textContent = 'Sign in to view your brand dashboard';
      document.getElementById('err').style.display = 'none';
      document.getElementById('email').focus();
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.textContent = 'Checking…'; btn.disabled = true;
      try {
        const r = await fetch('/client/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = '/client/dashboard';
        } else if (data.needsSetup) {
          showSetupForm(null, document.getElementById('email').value.trim());
        } else {
          err.textContent = data.error || 'Login failed — check your credentials and try again.';
          err.style.display = 'block';
        }
      } catch (_) {
        err.textContent = 'Network error — please try again.';
        err.style.display = 'block';
      }
      btn.textContent = 'Sign In'; btn.disabled = false;
    });

    document.getElementById('form-setup').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-setup');
      const err = document.getElementById('err');
      err.style.display = 'none';
      const email = document.getElementById('setup-email').value.trim();
      const pw    = document.getElementById('new-password').value;
      const pw2   = document.getElementById('confirm-password').value;
      if (!email) { err.textContent = 'Email is required.'; err.style.display = 'block'; return; }
      if (pw !== pw2) { err.textContent = "Passwords don't match."; err.style.display = 'block'; return; }
      btn.textContent = 'Creating account…'; btn.disabled = true;
      try {
        const r = await fetch('/client/set-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = '/client/dashboard';
        } else if (data.error && data.error.includes('being set up')) {
          // Pipeline still running — auto-retry every 10s for up to 3 min
          startSetupPolling(email, pw);
        } else {
          err.style.color = '';
          err.textContent = data.error || 'Something went wrong — please try again.';
          err.style.display = 'block';
          btn.textContent = 'Create Account & Sign In'; btn.disabled = false;
        }
      } catch (_) {
        err.textContent = 'Network error — please try again.';
        err.style.display = 'block';
        btn.textContent = 'Create Account & Sign In'; btn.disabled = false;
      }
    });
    var _pollTimer = null;
    function startSetupPolling(email, pw) {
      const btn = document.getElementById('btn-setup');
      const err = document.getElementById('err');
      let attempts = 0;
      const maxAttempts = 18; // 18 × 10s = 3 minutes

      function updateMsg() {
        const remaining = Math.round((maxAttempts - attempts) * 10);
        err.style.color = '#f59e0b';
        err.textContent = '⏳ Setting up your account… checking again in a moment (' + remaining + 's remaining)';
        err.style.display = 'block';
      }
      updateMsg();

      clearInterval(_pollTimer);
      _pollTimer = setInterval(async function() {
        attempts++;
        if (attempts > maxAttempts) {
          clearInterval(_pollTimer);
          err.style.color = '';
          err.textContent = 'Your account setup is taking longer than expected. Please refresh and try again, or contact your account manager.';
          err.style.display = 'block';
          btn.textContent = 'Create Account & Sign In'; btn.disabled = false;
          return;
        }
        updateMsg();
        try {
          const r = await fetch('/client/set-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pw }),
          });
          const data = await r.json();
          if (r.ok && data.ok) {
            clearInterval(_pollTimer);
            window.location.href = '/client/dashboard';
          } else if (!data.error || !data.error.includes('being set up')) {
            // Got a different error — stop polling and show it
            clearInterval(_pollTimer);
            err.style.color = '';
            err.textContent = data.error || 'Something went wrong.';
            err.style.display = 'block';
            btn.textContent = 'Create Account & Sign In'; btn.disabled = false;
          }
          // Still "being set up" → keep polling
        } catch (_) { /* network blip — keep polling */ }
      }, 10000);
    }
  </script>
</body>
</html>
